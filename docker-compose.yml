version: '3.8'

# ============================================================
# 生产环境部署说明:
# 1. 复制 .env.example 为 .env
# 2. 修改 .env 中所有敏感值（密码、密钥等）
# 3. docker-compose up -d
# ============================================================

services:
  mysql:
    image: mysql:8.0
    container_name: crane-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?请在 .env 中设置 MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-crane_system}
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "${DB_PORT_EXPOSE:-3306}:3306"
    networks:
      - crane-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crane-backend
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      APP_ENV: production
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:?请在 .env 中设置 MYSQL_ROOT_PASSWORD}
      DB_NAME: ${DB_NAME:-crane_system}
      JWT_SECRET: ${JWT_SECRET:?请在 .env 中设置 JWT_SECRET（至少32字符）}
      DEFAULT_PASSWORD: ${DEFAULT_PASSWORD:?请在 .env 中设置 DEFAULT_PASSWORD（至少8字符）}
      SERVER_PORT: 8080
      AUTO_MIGRATE: "false"
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost,http://127.0.0.1}
      UPLOADS_DIR: /app/uploads
      BACKUPS_DIR: /app/backups
      FRONTEND_DIST: /app/frontend-dist
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - crane-network
    restart: unless-stopped
    volumes:
      - ./uploads:/app/uploads
      - ./backups:/app/backups

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: crane-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - crane-network
    restart: unless-stopped

volumes:
  mysql_data:
    driver: local

networks:
  crane-network:
    driver: bridge
