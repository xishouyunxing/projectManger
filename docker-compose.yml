version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: crane-mysql
    environment:
      MYSQL_ROOT_PASSWORD: crane123456
      MYSQL_DATABASE: crane_system
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - crane-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crane-backend
    ports:
      - "8080:8080"
    environment:
      APP_ENV: production
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: crane123456
      DB_NAME: crane_system
      JWT_SECRET: crane-secret-key-change-in-production-1234567890
      DEFAULT_PASSWORD: admin123456
      SERVER_PORT: 8080
      AUTO_MIGRATE: "false"
      CORS_ALLOWED_ORIGINS: http://localhost,http://127.0.0.1
      UPLOADS_DIR: /app/uploads
      BACKUPS_DIR: /app/backups
      FRONTEND_DIST: /app/frontend-dist
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - crane-network
    volumes:
      - ./uploads:/app/uploads
      - ./backups:/app/backups

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: crane-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - crane-network

volumes:
  mysql_data:
    driver: local

networks:
  crane-network:
    driver: bridge
